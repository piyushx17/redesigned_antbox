<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AntBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-bg-mesh {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 80% 20%, rgba(232,129,58,0.07), transparent 60%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(232,129,58,0.04), transparent 60%);
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="auth-bg-mesh"></div>
<main class="auth-wrap">
  <section class="auth-card reveal">
    <a class="logo" href="index.html" style="margin-bottom:24px;display:inline-flex"><span class="logo-mark"></span><span style="font-size:15px;font-weight:800;letter-spacing:0.06em">ANTBOX</span></a>
    <h1 style="font-size:54px;margin:0 0 6px">Welcome back</h1>
    <p style="margin-bottom:22px">Select your role to continue</p>

    <div class="role-grid" id="roles">
      <button class="role-card" data-role="student">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3L2 8l10 5 10-5-10-5z"/><path d="M2 8v8"/><path d="M6 11v6c2 2 8 2 10 0v-6"/></svg>
        Student
      </button>
      <button class="role-card" data-role="intern">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
        Intern
      </button>
      <button class="role-card" data-role="mentor">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/><path d="M19 11l2 2-2 2"/></svg>
        Mentor
      </button>
      <button class="role-card" data-role="recruiter">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg>
        Recruiter
      </button>
      <button class="role-card" data-role="admin">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M8.46 8.46a5 5 0 0 0 0 7.07"/></svg>
        Admin
      </button>
    </div>

    <form id="loginForm" class="hidden" style="margin-top:18px;display:grid;gap:10px">
      <input class="input" required type="email" placeholder="Email address" />
      <input class="input" required type="password" placeholder="Password" />
      <button class="btn btn-brand" type="submit" style="margin-top:4px">Login</button>
    </form>
    <p style="margin-top:16px;font-size:14px;color:var(--muted)">Don't have an account? <a href="signup.html" style="color:var(--amber)">Sign up</a></p>
  </section>
</main>
<script src="components.js"></script>
<script>
  let selectedRole = '';
  const map = { student:'dashboards/student.html', intern:'dashboards/intern.html', mentor:'dashboards/mentor.html', recruiter:'dashboards/recruiter.html', admin:'dashboards/admin.html' };
  document.getElementById('roles').addEventListener('click', e => {
    const card = e.target.closest('.role-card');
    if (!card) return;
    document.querySelectorAll('.role-card').forEach(el => el.classList.remove('active'));
    card.classList.add('active');
    selectedRole = card.dataset.role;
    document.getElementById('loginForm').classList.remove('hidden');
  });
  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    if (!selectedRole) return;
    localStorage.setItem('antboxRole', selectedRole);
    window.location.href = map[selectedRole];
  });
</script>
</body>
</html>
