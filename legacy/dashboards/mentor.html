<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mentor Dashboard - AntBox</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="../dashboard.css"></head>
<body><div class="dash-shell"><aside class="sidebar"><a class="logo" href="../index.html"><span class="logo-mark"></span><span>AntBox</span></a><nav class="side-links" id="n"></nav><div class="side-user"><div class="avatar">RM</div><div><strong style="color:#fff">Rahul</strong><br><a href="../login.html">Logout</a></div></div></aside><div class="dash-main"><header class="topbar"><div class="breadcrumb">Mentor / Dashboard</div><div class="search-wrap"><input class="input" placeholder="Search intern" /></div><div class="top-actions"><button class="icon-btn">🔔<span class="badge-dot">4</span></button><div class="avatar">RM</div></div></header><main class="dash-content">
<section class="panel active" data-p="Overview"><h2 style="font-size:40px">Good morning, Rahul 👋</h2><div class="stats-grid"><article class="kpi"><p>Active Interns</p><strong>6</strong></article><article class="kpi"><p>Pending Reviews</p><strong>3</strong></article><article class="kpi"><p>Sessions This Week</p><strong>4</strong></article><article class="kpi"><p>Avg Rating</p><strong>4.3</strong></article></div><div class="two-col" style="margin-top:12px"><article class="card"><h3 style="font-size:24px">Assigned Interns</h3><div id="assigned"></div></article><article class="card"><h3 style="font-size:24px">Upcoming Sessions</h3><div id="sessions"></div></article></div></section>
<section class="panel" data-p="My Interns"><div class="grid-3" id="internGrid"></div></section>
<section class="panel" data-p="Reviews"><div id="reviewPending"></div><h3 style="font-size:26px;margin:12px 0">Completed</h3><div id="reviewDone"></div></section>
<section class="panel" data-p="Schedule"><div class="card"><div class="calendar" id="week"></div><form id="addSession" class="grid-2" style="margin-top:10px"><input class="input" placeholder="Intern" required><input class="input" type="date" required><input class="input" type="time" required><button class="btn btn-brand">Add Session</button></form></div></section>
<section class="panel" data-p="Messages"><div class="two-col"><article class="card"><h3 style="font-size:24px">Interns</h3><p>Aarav</p><p>Priya</p><p>Karan</p></article><article class="card"><div class="chat" id="chat"><div class="chat-msg">Aarav: Can we review system design?</div></div><form id="sendChat" style="display:flex;gap:8px;margin-top:8px"><input class="input" placeholder="Type message"><button class="btn btn-brand">Send</button></form></article></div></section>
<section class="panel" data-p="Settings"><article class="card"><div style="display:flex;justify-content:space-between"><span>Email updates</span><button class="toggle on"></button></div></article></section>
</main></div></div>
<script>
const tabs=["Overview","My Interns","Reviews","Schedule","Messages","Settings"];tabs.forEach((t,i)=>{const a=document.createElement("a");a.href="#";a.className="side-link"+(i===0?" active":"");a.innerHTML=`<svg viewBox="0 0 24 24" fill="none"><path d="M4 12h16M12 4v16" stroke-width="1.8"/></svg><span>${t}</span>`;a.onclick=(e)=>{e.preventDefault();document.querySelectorAll(".side-link").forEach(x=>x.classList.remove("active"));a.classList.add("active");document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));document.querySelector(`[data-p="${t}"]`).classList.add("active");};n.appendChild(a);});
const interns=[["Aarav","IITD","Growth",86],["Priya","BITS","Marketing",87],["Nia","VIT","Design",82],["Dev","NIT","Data",89],["Omar","SRM","Ops",78],["Riya","MIT","Eng",84]];
assigned.innerHTML=interns.slice(0,3).map(i=>`<article class="card"><strong>${i[0]}</strong><p>${i[2]}</p></article>`).join("");
sessions.innerHTML=["Mon 10:00 Aarav","Wed 14:00 Priya","Fri 11:30 Dev"].map(s=>`<p>${s}</p>`).join("");
internGrid.innerHTML=interns.map(i=>`<article class="card"><div class="avatar">${i[0][0]}</div><h3 style="font-size:24px;margin:8px 0">${i[0]}</h3><p>${i[1]} • ${i[2]}</p><p>Score ${i[3]}</p><div class="progress"><span style="width:${i[3]}%"></span></div><button class="btn" data-expand="${i[0]}">Expand</button><div id="x-${i[0]}" class="hidden"><p>Tasks 8/10, Attendance 92%</p></div></article>`).join("");
internGrid.onclick=(e)=>{if(e.target.dataset.expand)document.getElementById("x-"+e.target.dataset.expand).classList.toggle("hidden");};
const pending=[{name:"Aarav"},{name:"Priya"},{name:"Omar"}],done=[];
function renderReviews(){reviewPending.innerHTML=pending.map((p,i)=>`<article class="card"><strong>${p.name}</strong><form data-i="${i}" class="dash-grid"><div>${[1,2,3,4,5].map(s=>`<span class="star" data-s="${s}">★</span>`).join("")}<input type="hidden" value="0"></div><textarea class="input" required></textarea><button class="btn btn-brand">Submit Review</button></form></article>`).join("");reviewDone.innerHTML=done.map(d=>`<article class="card"><strong>${d.name}</strong><p>${d.rating}/5</p><p>${d.text}</p></article>`).join("");}
reviewPending.onclick=(e)=>{if(e.target.classList.contains("star")){const box=e.target.parentElement;box.querySelectorAll(".star").forEach(s=>s.classList.toggle("on",+s.dataset.s<=+e.target.dataset.s));box.querySelector("input").value=e.target.dataset.s;}};
reviewPending.onsubmit=(e)=>{e.preventDefault();const i=+e.target.dataset.i;done.push({name:pending[i].name,rating:e.target.querySelector("input").value,text:e.target.querySelector("textarea").value});pending.splice(i,1);renderReviews();};
["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].forEach((d,i)=>week.innerHTML+=`<div class="day"><strong>${d}</strong><p>${i===0?"10:00 Aarav":i===2?"14:00 Priya":i===4?"11:30 Dev":""}</p></div>`);
addSession.onsubmit=(e)=>{e.preventDefault();week.innerHTML+=`<div class="day"><strong>New</strong><p>${e.target[0].value} ${e.target[1].value} ${e.target[2].value}</p></div>`;e.target.reset();};
sendChat.onsubmit=(e)=>{e.preventDefault();chat.innerHTML+=`<div class="chat-msg me">You: ${e.target[0].value}</div>`;e.target.reset();chat.scrollTop=chat.scrollHeight;};
document.querySelectorAll(".toggle").forEach(t=>t.onclick=()=>t.classList.toggle("on"));renderReviews();
</script></body></html>
